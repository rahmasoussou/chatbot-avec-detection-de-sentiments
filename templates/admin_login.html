<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lumia · Accès Administration</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--g1:#54a0ff;--g2:#ff9ff3;--g3:#feca57;--dark:#0d0d1a}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  background:var(--dark);min-height:100vh;display:flex;align-items:center;justify-content:center;overflow:hidden}

.bg-orbs{position:fixed;inset:0;z-index:0;pointer-events:none}
.orb{position:absolute;border-radius:50%;filter:blur(90px);opacity:0.12;animation:drift 10s ease-in-out infinite}
.orb1{width:500px;height:500px;background:var(--g1);top:-150px;left:-100px}
.orb2{width:400px;height:400px;background:var(--g2);bottom:-100px;right:-80px;animation-delay:-5s}
@keyframes drift{0%,100%{transform:translate(0,0)}50%{transform:translate(20px,-15px)}}

.card{position:relative;z-index:1;background:rgba(20,20,45,0.9);backdrop-filter:blur(32px);
  border-radius:28px;border:1px solid rgba(255,255,255,0.08);
  padding:48px 44px;width:100%;max-width:420px;text-align:center;
  box-shadow:0 32px 64px rgba(0,0,0,0.5)}

.logo-ring{width:72px;height:72px;margin:0 auto 20px;border-radius:50%;
  background:linear-gradient(135deg,var(--g1),var(--g2));padding:2px;animation:spin 8s linear infinite}
@keyframes spin{to{filter:hue-rotate(360deg)}}
.logo-inner{width:100%;height:100%;border-radius:50%;background:#13132b;
  display:flex;align-items:center;justify-content:center;font-size:28px}

h1{font-size:24px;font-weight:700;margin-bottom:6px;
  background:linear-gradient(135deg,var(--g1),var(--g2));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent}
.sub{font-size:13px;color:#6666aa;margin-bottom:32px}

.field{margin-bottom:18px;text-align:left}
label{display:block;font-size:12px;color:#8888bb;margin-bottom:7px;font-weight:500;text-transform:uppercase;letter-spacing:0.06em}
input{width:100%;padding:13px 16px;background:rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.1);border-radius:14px;
  color:#f0f0ff;font-size:14px;outline:none;transition:all 0.2s}
input::placeholder{color:#4444aa}
input:focus{border-color:rgba(84,160,255,0.6);background:rgba(84,160,255,0.08);
  box-shadow:0 0 0 3px rgba(84,160,255,0.1)}

.btn{width:100%;padding:14px;margin-top:8px;border:none;border-radius:16px;
  background:linear-gradient(135deg,var(--g1),var(--g2));
  color:#fff;font-size:15px;font-weight:600;cursor:pointer;
  transition:all 0.2s;letter-spacing:0.02em}
.btn:hover{transform:translateY(-2px);box-shadow:0 12px 30px rgba(84,160,255,0.3)}
.btn:active{transform:none}

.error{background:rgba(231,76,60,0.12);border:1px solid rgba(231,76,60,0.3);
  color:#e74c3c;padding:12px;border-radius:12px;font-size:13px;margin-bottom:20px}
.hint{font-size:11px;color:#444488;margin-top:20px}
.hint strong{color:#6666aa}
</style>
</head>
<body>
<div class="bg-orbs"><div class="orb orb1"></div><div class="orb orb2"></div></div>
<div class="card">
  <div class="logo-ring"><div class="logo-inner">🔐</div></div>
  <h1>Espace Direction</h1>
  <p class="sub">Accès sécurisé au tableau de bord Lumia</p>

  {% if error %}<div class="error">{{ error }}</div>{% endif %}

  <form method="POST">
    <div class="field">
      <label>Identifiant</label>
      <input type="text" name="username" placeholder="admin" autocomplete="username" autofocus>
    </div>
    <div class="field">
      <label>Mot de passe</label>
      <input type="password" name="password" placeholder="••••••••" autocomplete="current-password">
    </div>
    <button type="submit" class="btn">Se connecter →</button>
  </form>
  <p class="hint">Accès restreint · <strong>admin</strong> / <strong>admin123</strong></p>
</div>
</body>
</html>
