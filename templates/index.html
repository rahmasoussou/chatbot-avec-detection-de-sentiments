<!DOCTYPE html>
<html lang="fr" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lumia · Assistant IA Premium</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --g1:#ff6b6b;--g2:#feca57;--g3:#48dbfb;--g4:#ff9ff3;--g5:#54a0ff;
  --dark:#0d0d1a;--dark2:#13132b;--card:#1e1e3f;
  --border:rgba(255,255,255,0.08);--text:#f0f0ff;--muted:#8888bb;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  background:var(--dark);color:var(--text);height:100vh;overflow:hidden}

/* orbs */
.bg-orbs{position:fixed;inset:0;z-index:0;overflow:hidden;pointer-events:none}
.orb{position:absolute;border-radius:50%;filter:blur(80px);opacity:0.15;animation:drift 12s ease-in-out infinite}
.orb1{width:400px;height:400px;background:var(--g5);top:-100px;left:-100px}
.orb2{width:350px;height:350px;background:var(--g1);top:60%;right:-80px;animation-delay:-4s}
.orb3{width:300px;height:300px;background:var(--g4);bottom:-80px;left:40%;animation-delay:-8s}
@keyframes drift{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(30px,-20px) scale(1.05)}}

/* layout */
.app{display:flex;height:100vh;position:relative;z-index:1;max-width:1400px;margin:0 auto;padding:16px;gap:16px}

/* sidebar */
.sidebar{width:280px;background:rgba(20,20,45,0.9);backdrop-filter:blur(24px);
  border-radius:24px;border:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;flex-shrink:0}
.sidebar-top{padding:24px 20px 18px;text-align:center;
  background:linear-gradient(160deg,rgba(84,160,255,0.15),rgba(255,159,243,0.1));
  border-bottom:1px solid var(--border)}
.avatar-ring{width:68px;height:68px;border-radius:50%;margin:0 auto 12px;
  background:linear-gradient(135deg,var(--g5),var(--g4),var(--g1));padding:2px;
  animation:hue 8s linear infinite}
@keyframes hue{to{filter:hue-rotate(360deg)}}
.avatar-inner{width:100%;height:100%;border-radius:50%;background:var(--dark2);
  display:flex;align-items:center;justify-content:center;font-size:26px}
.bot-name{font-size:17px;font-weight:700;
  background:linear-gradient(135deg,var(--g5),var(--g4));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent}
.bot-sub{font-size:11px;color:var(--muted);margin-top:3px}
.status-dot{display:inline-block;width:6px;height:6px;border-radius:50%;
  background:#2ecc71;margin-right:4px;animation:blink 2s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.4}}

/* ── Language switcher ── */
.lang-bar{display:flex;gap:6px;padding:12px 14px;border-bottom:1px solid var(--border);
  background:rgba(255,255,255,0.02);justify-content:center}
.lang-btn{flex:1;padding:7px 4px;border-radius:10px;border:1px solid var(--border);
  background:transparent;color:var(--muted);font-size:12px;cursor:pointer;transition:all 0.2s;
  display:flex;flex-direction:column;align-items:center;gap:2px}
.lang-btn span.flag{font-size:16px}
.lang-btn span.code{font-size:9px;letter-spacing:0.06em;text-transform:uppercase}
.lang-btn:hover{background:rgba(255,255,255,0.06);color:var(--text)}
.lang-btn.active{background:linear-gradient(135deg,rgba(84,160,255,0.2),rgba(255,159,243,0.15));
  border-color:rgba(84,160,255,0.4);color:var(--text)}
.lang-btn.active span.code{color:var(--g5)}

/* sentiment counters */
.sent-row{display:flex;justify-content:space-around;padding:12px 10px;
  background:rgba(255,255,255,0.03);border-bottom:1px solid var(--border)}
.sent-item{text-align:center}
.sent-num{font-size:19px;font-weight:700}
.sent-lbl{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:0.06em}
.pos{color:#2ecc71}.neu{color:#95a5a6}.neg{color:#e74c3c}

/* suggestions */
.suggestions{padding:14px 12px;flex:1;overflow-y:auto}
.suggestions::-webkit-scrollbar{width:3px}
.suggestions::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.08);border-radius:2px}
.s-title{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:0.1em;margin-bottom:8px}
.s-btn{width:100%;padding:9px 12px;margin-bottom:5px;border-radius:12px;
  border:1px solid var(--border);background:rgba(255,255,255,0.03);
  color:var(--text);font-size:12px;text-align:left;cursor:pointer;transition:all 0.2s}
.s-btn:hover{background:rgba(84,160,255,0.15);border-color:rgba(84,160,255,0.4);transform:translateX(4px)}
.reset-btn{margin:10px;padding:9px;border-radius:14px;border:1px solid rgba(231,76,60,0.3);
  background:rgba(231,76,60,0.06);color:#e74c3c;font-size:12px;cursor:pointer;transition:all 0.2s}
.reset-btn:hover{background:rgba(231,76,60,0.18)}

/* chat area */
.chat-area{flex:1;display:flex;flex-direction:column;background:rgba(18,18,38,0.88);
  backdrop-filter:blur(20px);border-radius:24px;border:1px solid var(--border);overflow:hidden}

/* header */
.chat-header{padding:14px 22px;display:flex;align-items:center;justify-content:space-between;
  border-bottom:1px solid var(--border);
  background:linear-gradient(90deg,rgba(84,160,255,0.06),rgba(255,159,243,0.05))}
.header-left{display:flex;align-items:center;gap:10px}
.header-avatar{width:36px;height:36px;border-radius:50%;
  background:linear-gradient(135deg,var(--g5),var(--g4));
  display:flex;align-items:center;justify-content:center;font-size:15px}
.header-name{font-size:14px;font-weight:600}
.header-status{font-size:11px;color:#2ecc71}
.header-lang-badge{font-size:10px;padding:2px 8px;border-radius:10px;
  background:rgba(84,160,255,0.15);color:var(--g5);border:1px solid rgba(84,160,255,0.25);
  margin-left:8px;letter-spacing:0.04em}

.voice-btns{display:flex;gap:7px}
.v-btn{width:36px;height:36px;border-radius:50%;border:1px solid var(--border);
  background:rgba(255,255,255,0.05);color:var(--text);font-size:15px;cursor:pointer;transition:all 0.2s}
.v-btn:hover{background:rgba(84,160,255,0.18)}
.v-btn.active{background:linear-gradient(135deg,var(--g5),var(--g4));border-color:transparent}
.v-btn.listening{background:#e74c3c;border-color:transparent;animation:pulse-red 1.1s infinite}
@keyframes pulse-red{0%,100%{transform:scale(1)}50%{transform:scale(1.13)}}

/* messages */
.messages{flex:1;overflow-y:auto;padding:18px 22px;display:flex;flex-direction:column;gap:12px}
.messages::-webkit-scrollbar{width:3px}
.messages::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.07);border-radius:2px}
.message{display:flex;gap:9px;max-width:78%;animation:msgIn 0.28s ease}
@keyframes msgIn{from{opacity:0;transform:translateY(7px)}to{opacity:1;transform:none}}
.message.user{align-self:flex-end;flex-direction:row-reverse}
.msg-av{width:32px;height:32px;border-radius:10px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;font-size:13px}
.message.bot .msg-av{background:linear-gradient(135deg,var(--g5),var(--g4))}
.message.user .msg-av{background:linear-gradient(135deg,var(--g1),var(--g2))}
.bubble{padding:10px 15px;border-radius:17px;font-size:14px;line-height:1.5;word-break:break-word}
.message.bot .bubble{background:var(--card);border-bottom-left-radius:4px;color:var(--text)}
.message.user .bubble{background:linear-gradient(135deg,var(--g5),#7b68ee);
  border-bottom-right-radius:4px;color:#fff}
/* RTL for Arabic */
.message.rtl .bubble{direction:rtl;text-align:right}

.sent-badge{display:inline-flex;align-items:center;gap:4px;
  font-size:10px;padding:2px 8px;border-radius:16px;margin-top:5px;font-weight:500}
.sent-badge.positif{background:rgba(46,204,113,0.12);color:#2ecc71;border:1px solid rgba(46,204,113,0.22)}
.sent-badge.neutre{background:rgba(149,165,166,0.12);color:#95a5a6;border:1px solid rgba(149,165,166,0.22)}
.sent-badge.negatif{background:rgba(231,76,60,0.12);color:#e74c3c;border:1px solid rgba(231,76,60,0.22)}

.typing{display:flex;gap:4px;padding:11px 15px;background:var(--card);
  border-radius:17px;border-bottom-left-radius:4px;width:fit-content}
.typing span{width:6px;height:6px;background:var(--muted);border-radius:50%;animation:bounce 1.2s infinite}
.typing span:nth-child(2){animation-delay:.15s}.typing span:nth-child(3){animation-delay:.3s}
@keyframes bounce{0%,60%,100%{transform:none}30%{transform:translateY(-5px)}}

/* input */
.input-area{padding:14px 22px 18px;border-top:1px solid var(--border);background:rgba(13,13,26,0.5)}
.input-wrap{display:flex;gap:8px;background:var(--card);
  border-radius:18px;padding:5px 5px 5px 16px;border:1px solid var(--border);transition:border-color 0.2s}
.input-wrap:focus-within{border-color:rgba(84,160,255,0.5);box-shadow:0 0 0 3px rgba(84,160,255,0.07)}
textarea{flex:1;background:transparent;border:none;color:var(--text);
  font-size:14px;resize:none;outline:none;padding:9px 0;max-height:88px;font-family:inherit;line-height:1.4}
textarea::placeholder{color:var(--muted)}
textarea[dir="rtl"]{text-align:right}
.send-btn{width:40px;height:40px;border-radius:12px;border:none;cursor:pointer;
  background:linear-gradient(135deg,var(--g5),var(--g4));color:#fff;font-size:17px;transition:all 0.2s;flex-shrink:0}
.send-btn:hover{transform:scale(1.08)}.send-btn:disabled{opacity:0.4;transform:none}
.input-footer{display:flex;justify-content:space-between;align-items:center;margin-top:8px}
.input-hint{font-size:10px;color:var(--muted)}
.voice-status{font-size:11px;min-height:15px;transition:color 0.2s}

/* waveform animation when recording */
.waveform{display:none;align-items:center;gap:3px;height:20px}
.waveform.active{display:flex}
.wave-bar{width:3px;background:var(--g1);border-radius:2px;animation:wave 0.8s ease-in-out infinite}
.wave-bar:nth-child(1){height:6px;animation-delay:0s}
.wave-bar:nth-child(2){height:14px;animation-delay:.1s}
.wave-bar:nth-child(3){height:10px;animation-delay:.2s}
.wave-bar:nth-child(4){height:18px;animation-delay:.3s}
.wave-bar:nth-child(5){height:8px;animation-delay:.4s}
@keyframes wave{0%,100%{transform:scaleY(1)}50%{transform:scaleY(0.4)}}

@media(max-width:700px){
  .app{flex-direction:column;padding:8px;gap:8px}
  .sidebar{width:100%;max-height:200px;border-radius:16px}
  .suggestions{display:none}
  .message{max-width:92%}
}
</style>
</head>
<body>
<div class="bg-orbs">
  <div class="orb orb1"></div><div class="orb orb2"></div><div class="orb orb3"></div>
</div>

<div class="app">
  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-top">
      <div class="avatar-ring"><div class="avatar-inner">✨</div></div>
      <div class="bot-name">Lumia</div>
      <div class="bot-sub"><span class="status-dot"></span><span id="statusText">Assistant IA Premium · 24/7</span></div>
    </div>

    <!-- Language switcher -->
    <div class="lang-bar">
      <button class="lang-btn active" data-lang="fr" onclick="switchLang('fr')">
        <span class="flag">🇫🇷</span><span class="code">FR</span>
      </button>
      <button class="lang-btn" data-lang="en" onclick="switchLang('en')">
        <span class="flag">🇬🇧</span><span class="code">EN</span>
      </button>
      <button class="lang-btn" data-lang="ar" onclick="switchLang('ar')">
        <span class="flag">🇸🇦</span><span class="code">عر</span>
      </button>
    </div>

    <div class="sent-row">
      <div class="sent-item"><div class="sent-num pos" id="posCount">0</div><div class="sent-lbl" id="lbl-pos">😊 Positifs</div></div>
      <div class="sent-item"><div class="sent-num neu" id="neuCount">0</div><div class="sent-lbl" id="lbl-neu">😐 Neutres</div></div>
      <div class="sent-item"><div class="sent-num neg" id="negCount">0</div><div class="sent-lbl" id="lbl-neg">😟 Négatifs</div></div>
    </div>

    <div class="suggestions">
      <div class="s-title" id="sug-title">Suggestions rapides</div>
      <div id="sug-list"></div>
    </div>

    <button class="reset-btn" id="resetBtn" onclick="resetChat()">🗑️ Nouvelle conversation</button>
  </aside>

  <!-- Chat -->
  <main class="chat-area">
    <div class="chat-header">
      <div class="header-left">
        <div class="header-avatar">✨</div>
        <div>
          <div style="display:flex;align-items:center">
            <div class="header-name">Lumia</div>
            <span class="header-lang-badge" id="langBadge">FR</span>
          </div>
          <div class="header-status" id="headerStatus">● En ligne</div>
        </div>
      </div>
      <div class="voice-btns">
        <a href="/history" class="v-btn" title="Historique" style="text-decoration:none;display:flex;align-items:center;justify-content:center">📋</a>
        <button class="v-btn" id="ttsBtn" onclick="toggleTTS()" title="Synthèse vocale">🔊</button>
        <button class="v-btn" id="micBtn" onclick="toggleVoice()" title="Parler">🎤</button>
      </div>
    </div>

    <div class="messages" id="messages"></div>

    <div class="input-area">
      <div class="input-wrap">
        <textarea id="userInput" placeholder="Écrivez votre message…" rows="1" onkeydown="handleKey(event)"></textarea>
        <button class="send-btn" id="sendBtn" onclick="sendMessage()">➤</button>
      </div>
      <div class="input-footer">
        <div class="input-hint" id="inputHint">↵ Envoyer · ⇧↵ Saut de ligne · Sentiment analysé en temps réel</div>
        <div style="display:flex;align-items:center;gap:8px">
          <div class="waveform" id="waveform">
            <div class="wave-bar"></div><div class="wave-bar"></div><div class="wave-bar"></div>
            <div class="wave-bar"></div><div class="wave-bar"></div>
          </div>
          <div class="voice-status" id="voiceStatus"></div>
        </div>
      </div>
    </div>
  </main>
</div>

<script>
// ── i18n ─────────────────────────────────────────────────────────────────
const I18N = {
  fr: {
    status: "Assistant IA Premium · 24/7",
    online: "● En ligne",
    sugTitle: "Suggestions rapides",
    hint: "↵ Envoyer · ⇧↵ Saut de ligne · Sentiment analysé en temps réel",
    reset: "🗑️ Nouvelle conversation",
    placeholder: "Écrivez votre message…",
    lbl_pos: "😊 Positifs", lbl_neu: "😐 Neutres", lbl_neg: "😟 Négatifs",
    sent_lbl: { positif:"positif", neutre:"neutre", negatif:"négatif" },
    recording: "🎤 Enregistrement… (cliquer pour arrêter)",
    transcribing: "⏳ Transcription…",
    mic_denied: "❌ Accès micro refusé",
    suggestions: [
      {icon:"📝", text:"Comment créer un compte ?"},
      {icon:"⏰", text:"Quels sont vos horaires ?"},
      {icon:"📞", text:"Comment vous contacter ?"},
      {icon:"🔐", text:"J'ai oublié mon mot de passe"},
      {icon:"⭐", text:"Je suis très satisfait du service !"},
      {icon:"🚨", text:"J'ai un problème urgent"}
    ]
  },
  en: {
    status: "Premium AI Assistant · 24/7",
    online: "● Online",
    sugTitle: "Quick suggestions",
    hint: "↵ Send · ⇧↵ New line · Sentiment analysed in real time",
    reset: "🗑️ New conversation",
    placeholder: "Type your message…",
    lbl_pos: "😊 Positive", lbl_neu: "😐 Neutral", lbl_neg: "😟 Negative",
    sent_lbl: { positif:"positive", neutre:"neutral", negatif:"negative" },
    recording: "🎤 Recording… (click to stop)",
    transcribing: "⏳ Transcribing…",
    mic_denied: "❌ Microphone access denied",
    suggestions: [
      {icon:"📝", text:"How do I create an account?"},
      {icon:"⏰", text:"What are your opening hours?"},
      {icon:"📞", text:"How can I contact you?"},
      {icon:"🔐", text:"I forgot my password"},
      {icon:"⭐", text:"I'm very happy with the service!"},
      {icon:"🚨", text:"I have an urgent problem"}
    ]
  },
  ar: {
    status: "مساعدة ذكاء اصطناعي متميزة · 24/7",
    online: "● متصل",
    sugTitle: "اقتراحات سريعة",
    hint: "↵ إرسال · ⇧↵ سطر جديد · تحليل المشاعر في الوقت الفعلي",
    reset: "🗑️ محادثة جديدة",
    placeholder: "اكتب رسالتك…",
    lbl_pos: "😊 إيجابي", lbl_neu: "😐 محايد", lbl_neg: "😟 سلبي",
    sent_lbl: { positif:"إيجابي", neutre:"محايد", negatif:"سلبي" },
    recording: "🎤 جارٍ التسجيل… (انقر للإيقاف)",
    transcribing: "⏳ جارٍ النسخ…",
    mic_denied: "❌ تم رفض الوصول إلى الميكروفون",
    suggestions: [
      {icon:"📝", text:"كيف أنشئ حساباً؟"},
      {icon:"⏰", text:"ما هي ساعات العمل؟"},
      {icon:"📞", text:"كيف يمكنني التواصل معكم؟"},
      {icon:"🔐", text:"نسيت كلمة المرور"},
      {icon:"⭐", text:"أنا سعيد جداً بالخدمة!"},
      {icon:"🚨", text:"لديّ مشكلة عاجلة"}
    ]
  }
};

// ── State ─────────────────────────────────────────────────────────────────
let lang = 'fr', ttsOn = false, ttsLang = 'fr-FR';
let isRec = false, mediaRec = null, audioChunks = [];
let counts = {positif:0, neutre:0, negatif:0};
const EMOJIS = {positif:'😊', neutre:'😐', negatif:'😟'};

const msgDiv  = document.getElementById('messages');
const input   = document.getElementById('userInput');
const sendBtn = document.getElementById('sendBtn');

// ── Language switch ────────────────────────────────────────────────────────
function switchLang(newLang) {
  if (lang === newLang) return;
  lang = newLang;
  const t = I18N[lang];
  const isRTL = lang === 'ar';

  // Document direction
  document.documentElement.lang = lang;
  document.documentElement.dir = isRTL ? 'rtl' : 'ltr';

  // UI text
  document.getElementById('statusText').textContent   = t.status;
  document.getElementById('headerStatus').textContent  = t.online;
  document.getElementById('sug-title').textContent     = t.sugTitle;
  document.getElementById('inputHint').textContent     = t.hint;
  document.getElementById('resetBtn').textContent      = t.reset;
  document.getElementById('lbl-pos').textContent       = t.lbl_pos;
  document.getElementById('lbl-neu').textContent       = t.lbl_neu;
  document.getElementById('lbl-neg').textContent       = t.lbl_neg;
  document.getElementById('langBadge').textContent     = lang.toUpperCase();
  input.placeholder = t.placeholder;
  input.dir = isRTL ? 'rtl' : 'ltr';

  // Suggestions
  document.getElementById('sug-list').innerHTML = t.suggestions.map(s =>
  `<button class="s-btn" data-text="${s.text.replace(/"/g,'&quot;')}">${s.icon} ${s.text}</button>`
).join('');

// Délégation d'événement — à ajouter juste après
  document.getElementById('sug-list').addEventListener('click', e => {
  const btn = e.target.closest('.s-btn');
  if (btn) sendSuggestion(btn.dataset.text);
});

  // Active button
  document.querySelectorAll('.lang-btn').forEach(b => b.classList.toggle('active', b.dataset.lang === lang));

  // Reset chat with new language welcome
  resetChat();
}

// ── UI helpers ─────────────────────────────────────────────────────────────
input.addEventListener('input', () => {
  input.style.height = 'auto';
  input.style.height = Math.min(input.scrollHeight, 88) + 'px';
});

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
}

function sendSuggestion(text) { input.value = text; sendMessage(); }

function updateCounts() {
  document.getElementById('posCount').textContent = counts.positif;
  document.getElementById('neuCount').textContent = counts.neutre;
  document.getElementById('negCount').textContent = counts.negatif;
}

function addMessage(text, isUser, sentiment, isRTLMsg) {
  const wrap = document.createElement('div');
  wrap.className = 'message ' + (isUser ? 'user' : 'bot') + (isRTLMsg ? ' rtl' : '');

  const av = document.createElement('div');
  av.className = 'msg-av';
  av.textContent = isUser ? '👤' : '✨';

  const inner = document.createElement('div');
  const bub = document.createElement('div');
  bub.className = 'bubble';
  bub.textContent = text;
  if (isRTLMsg) { bub.dir = 'rtl'; }
  inner.appendChild(bub);

  if (sentiment && !isUser) {
    const t = I18N[lang];
    const badge = document.createElement('div');
    badge.className = 'sent-badge ' + sentiment.label;
    const lbl = t.sent_lbl[sentiment.label] || sentiment.label;
    badge.innerHTML = `${EMOJIS[sentiment.label]||'😐'} ${lbl} · ${sentiment.percentage}% · ${sentiment.score}`;
    inner.appendChild(badge);
  }

  wrap.appendChild(av);
  wrap.appendChild(inner);
  msgDiv.appendChild(wrap);
  msgDiv.scrollTop = msgDiv.scrollHeight;

  if (!isUser && ttsOn && text) speak(text);
}

function showTyping() {
  const d = document.createElement('div');
  d.id = 'typing'; d.className = 'message bot';
  d.innerHTML = '<div class="msg-av">✨</div><div class="typing"><span></span><span></span><span></span></div>';
  msgDiv.appendChild(d);
  msgDiv.scrollTop = msgDiv.scrollHeight;
}
function hideTyping() { document.getElementById('typing')?.remove(); }

// ── Send message ──────────────────────────────────────────────────────────
async function sendMessage() {
  const msg = input.value.trim();
  if (!msg) return;

  const isAr = lang === 'ar';
  const cs = quickSentiment(msg);
  counts[cs.label]++;
  updateCounts();

  addMessage(msg, true, null, isAr);
  input.value = '';
  input.style.height = 'auto';
  sendBtn.disabled = true;
  showTyping();

  try {
    const res  = await fetch('/chat', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({message: msg, lang: lang})
    });
    const data = await res.json();
    hideTyping();
    if (data.error) {
      addMessage('⚠️ ' + data.error, false, null, false);
    } else {
      ttsLang = data.tts_lang || 'fr-FR';
      addMessage(data.reply, false, data.sentiment, isAr);
    }
  } catch {
    hideTyping();
    addMessage('⚠️ Connection error. Is the server running?', false, null, false);
  }
  sendBtn.disabled = false;
  input.focus();
}

function quickSentiment(text) {
  const t = text.toLowerCase();
  const pos = {
    fr: ['merci','super','parfait','excellent','bien','ravi'],
    en: ['thank','great','perfect','excellent','good','happy'],
    ar: ['شكر','ممتاز','رائع','جيد','سعيد']
  };
  const neg = {
    fr: ['decu','mauvais','probleme','nul','horrible'],
    en: ['disappointed','bad','problem','terrible','hate'],
    ar: ['سيء','مشكلة','رهيب','غاضب']
  };
  const p = (pos[lang]||pos.fr).filter(w=>t.includes(w)).length;
  const n = (neg[lang]||neg.fr).filter(w=>t.includes(w)).length;
  const score = Math.max(-1, Math.min(1, (p-n)/3));
  return {label: score>=0.2?'positif':score<=-0.2?'negatif':'neutre',
          score: Math.round(score*100)/100,
          percentage: Math.round(Math.abs(score)*100)};
}

// ── TTS ────────────────────────────────────────────────────────────────────
function toggleTTS() {
  ttsOn = !ttsOn;
  const btn = document.getElementById('ttsBtn');
  btn.classList.toggle('active', ttsOn);
  btn.textContent = ttsOn ? '🔊' : '🔇';
}

function speak(text) {
  if (!ttsOn || !window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = ttsLang;
  u.rate = lang === 'ar' ? 0.85 : 0.9;
  // Pick best available voice for language
  const voices = window.speechSynthesis.getVoices();
  const match = voices.find(v => v.lang.startsWith(ttsLang.split('-')[0]));
  if (match) u.voice = match;
  window.speechSynthesis.speak(u);
}

// ── Voice recording ────────────────────────────────────────────────────────
async function toggleVoice() {
  if (isRec) { stopRec(); return; }
  if (!navigator.mediaDevices) { setStatus(I18N[lang].mic_denied, '#e74c3c'); return; }
  try {
    const stream = await navigator.mediaDevices.getUserMedia({audio:true});
    audioChunks = [];
    mediaRec = new MediaRecorder(stream);
    mediaRec.ondataavailable = e => { if (e.data.size>0) audioChunks.push(e.data); };
    mediaRec.onstop = async () => {
      stream.getTracks().forEach(t=>t.stop());
      isRec = false;
      document.getElementById('micBtn').classList.remove('listening');
      document.getElementById('waveform').classList.remove('active');
      setStatus(I18N[lang].transcribing, '#feca57');

      const blob = new Blob(audioChunks, {type:'audio/webm'});
      const fd = new FormData();
      fd.append('audio', blob, 'audio.webm');
      fd.append('lang', lang);  // send language to backend for Whisper

      try {
        const r = await fetch('/transcribe', {method:'POST', body:fd});
        const d = await r.json();
        if (d.transcript) {
          input.value = d.transcript;
          setStatus('✅ ' + d.transcript.substring(0,45), '#2ecc71');
          sendMessage();
        } else {
          setStatus('❌ ' + (d.error||'Error'), '#e74c3c');
        }
      } catch { setStatus('❌ Network error', '#e74c3c'); }
      setTimeout(()=>setStatus('',''), 3000);
    };
    mediaRec.start();
    isRec = true;
    document.getElementById('micBtn').classList.add('listening');
    document.getElementById('waveform').classList.add('active');
    setStatus(I18N[lang].recording, '#feca57');
    setTimeout(()=>{ if(isRec) stopRec(); }, 15000);
  } catch { setStatus(I18N[lang].mic_denied, '#e74c3c'); }
}

function stopRec() {
  if (mediaRec && mediaRec.state==='recording') mediaRec.stop();
}

function setStatus(msg, color) {
  const el = document.getElementById('voiceStatus');
  el.textContent = msg;
  el.style.color = color || '';
}

// ── Reset ──────────────────────────────────────────────────────────────────
async function resetChat() {
  await fetch('/reset', {method:'POST'});
  msgDiv.innerHTML = '';
  counts = {positif:0, neutre:0, negatif:0};
  updateCounts();

  // Fetch welcome message from server (correct language)
  try {
    const r = await fetch('/welcome', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({lang})
    });
    const d = await r.json();
    ttsLang = d.tts_lang || 'fr-FR';
    addMessage(d.message, false, null, lang==='ar');
  } catch {
    addMessage('Hello! / Bonjour! / مرحباً!', false, null, false);
  }
}

// ── Init ───────────────────────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', () => {
  // Build initial suggestions (FR)
  switchLang('fr');  // this also calls resetChat
  window.speechSynthesis?.getVoices();
  input.focus();
});
</script>
